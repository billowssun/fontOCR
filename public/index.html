<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字体识别台</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@400;700;900&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Long+Cang&family=Zhi+Mang+Xing&family=Liu+Jian+Mao+Cao&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">

  <style>
    :root {
      color-scheme: light;
      --ink: #17212f;
      --muted: #64748b;
      --line: #d9e2ec;
      --surface: #ffffff;
      --soft: #f5f7fa;
      --brand: #0f8b6d;
      --brand-dark: #0b6f58;
      --accent: #e8572d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: #eef2f6;
      font-family: 'Noto Sans SC', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      letter-spacing: 0;
    }

    button, input, select { font: inherit; }

    .app-shell {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      color: #fff;
      background: var(--brand);
      border-radius: 8px;
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 900;
      line-height: 1.1;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      white-space: nowrap;
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #94a3b8;
    }

    .status-dot.ready { background: var(--brand); }

    .workspace {
      display: grid;
      grid-template-columns: minmax(360px, 0.92fr) minmax(420px, 1.08fr);
      gap: 18px;
      margin-top: 18px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 58px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      min-width: 0;
    }

    .panel-title span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .panel-body { padding: 16px; }

    .upload-zone {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 360px;
      border: 2px dashed #b8c5d2;
      border-radius: 8px;
      background: #f8fafc;
      transition: border-color 0.18s ease, background-color 0.18s ease;
    }

    .upload-zone.dragging,
    .upload-zone:hover {
      border-color: var(--brand);
      background: #eefaf6;
    }

    .upload-zone input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .upload-copy {
      display: grid;
      gap: 10px;
      justify-items: center;
      padding: 24px;
      text-align: center;
    }

    .upload-copy i {
      color: var(--brand);
      font-size: 42px;
    }

    .upload-copy strong {
      font-size: 18px;
    }

    .upload-copy small {
      color: var(--muted);
      line-height: 1.7;
    }

    .image-stage {
      display: none;
      background: #111827;
      border-radius: 8px;
      min-height: 360px;
      padding: 14px;
      position: relative;
    }

    .image-stage.active {
      display: grid;
      place-items: center;
    }

    .image-stage img {
      max-width: 100%;
      max-height: 560px;
      object-fit: contain;
      border-radius: 4px;
    }

    .image-stage.scanning::after {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      height: 3px;
      top: 24px;
      background: linear-gradient(90deg, transparent, #45d5a7, transparent);
      box-shadow: 0 0 16px rgba(69, 213, 167, 0.75);
      animation: scan 1.4s ease-in-out infinite;
    }

    @keyframes scan {
      0% { transform: translateY(0); opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { transform: translateY(500px); opacity: 0; }
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      transition: background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease;
      white-space: nowrap;
    }

    .btn:hover { border-color: #a8b5c3; background: #f8fafc; }
    .btn-primary { background: var(--brand); border-color: var(--brand); color: #fff; }
    .btn-primary:hover { background: var(--brand-dark); border-color: var(--brand-dark); }
    .btn:disabled { opacity: 0.6; cursor: wait; }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 12px;
      align-items: end;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .text-input,
    .select-input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      outline: none;
      padding: 0 12px;
    }

    .text-input:focus,
    .select-input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(15, 139, 109, 0.12);
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr 72px;
      gap: 12px;
      align-items: center;
    }

    input[type="range"] {
      accent-color: var(--brand);
      width: 100%;
    }

    .segmented {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .filter-btn {
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
    }

    .filter-btn.active {
      color: #fff;
      background: var(--ink);
      border-color: var(--ink);
    }

    .compare-strip {
      display: grid;
      grid-template-columns: 128px 1fr;
      gap: 12px;
      margin-top: 16px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
    }

    .source-thumb {
      min-height: 86px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 6px;
      background: #111827;
    }

    .source-thumb img {
      max-width: 100%;
      max-height: 118px;
      object-fit: contain;
    }

    .live-preview {
      min-width: 0;
      padding: 12px;
      border: 1px solid #e5edf3;
      border-radius: 6px;
      background: #fff;
    }

    .live-preview p {
      margin: 0;
      word-break: break-word;
      line-height: 1.25;
    }

    .signal-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .signal {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .signal small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .signal strong {
      display: block;
      font-size: 14px;
    }

    .results {
      margin-top: 18px;
    }

    .results-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .results-head h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .font-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .font-card-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 12px 0;
    }

    .font-card h3 {
      margin: 0;
      font-size: 15px;
      font-weight: 900;
    }

    .font-card small {
      color: var(--muted);
    }

    .score {
      min-width: 48px;
      text-align: right;
      color: var(--brand-dark);
      font-weight: 900;
    }

    .font-sample {
      min-height: 108px;
      padding: 14px 12px;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    .font-sample p {
      margin: 0;
      width: 100%;
      word-break: break-word;
      line-height: 1.22;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 12px 12px;
    }

    .tag {
      padding: 3px 7px;
      border-radius: 999px;
      background: #eef2f6;
      color: #475569;
      font-size: 11px;
      font-weight: 700;
    }

    .font-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #eef2f6;
      background: #fbfcfd;
    }

    .font-actions a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
    }

    .font-actions a:hover {
      border-color: var(--brand);
      color: var(--brand-dark);
    }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 220px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    .notice {
      margin-top: 12px;
      padding: 10px 12px;
      border-left: 3px solid var(--accent);
      background: #fff7ed;
      color: #9a3412;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.6;
    }

    .hidden { display: none !important; }

    #processing-canvas { display: none; }

    @media (max-width: 980px) {
      .workspace,
      .field-grid,
      .result-grid,
      .signal-grid {
        grid-template-columns: 1fr;
      }

      .compare-strip {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .app-shell { padding: 10px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .status-pill { width: 100%; justify-content: space-between; }
      .upload-zone,
      .image-stage { min-height: 260px; }
      .panel-head { padding: 0 12px; }
      .panel-body { padding: 12px; }
      .font-actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"><i class="ph-bold ph-text-aa text-2xl"></i></div>
        <div>
          <h1>字体识别台</h1>
          <p>上传样张，提取文字，筛选候选字体</p>
        </div>
      </div>
      <button id="service-button" class="status-pill" type="button">
        <span id="service-dot" class="status-dot"></span>
        <span id="service-text">检测 OCR 服务</span>
        <i class="ph-bold ph-info"></i>
      </button>
    </header>

    <main class="workspace">
      <section class="panel">
        <div class="panel-head">
          <div class="panel-title"><i class="ph-bold ph-image-square"></i><span>原图样张</span></div>
          <button id="reset-button" class="btn hidden" type="button" title="重新选择图片">
            <i class="ph-bold ph-arrow-counter-clockwise"></i>
            重选
          </button>
        </div>
        <div class="panel-body">
          <div id="upload-zone" class="upload-zone">
            <input id="file-input" type="file" accept="image/*">
            <div class="upload-copy">
              <i class="ph-bold ph-upload-simple"></i>
              <strong>点击、拖入或粘贴字体图片</strong>
              <small>建议使用清晰、正面、单行或少量文字的截图。</small>
            </div>
          </div>

          <div id="image-stage" class="image-stage">
            <img id="preview-img" alt="上传的字体样张">
          </div>

          <div class="toolbar">
            <button id="analyze-button" class="btn btn-primary" type="button" disabled>
              <i class="ph-bold ph-scan"></i>
              <span id="analyze-label">提取文字</span>
            </button>
            <button id="use-default-button" class="btn" type="button">
              <i class="ph-bold ph-keyboard"></i>
              手动输入
            </button>
          </div>

          <div id="status-line" class="notice hidden"></div>
          <canvas id="processing-canvas"></canvas>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div class="panel-title"><i class="ph-bold ph-sliders-horizontal"></i><span>识别与比对</span></div>
          <a class="btn" href="https://www.fonts.net.cn/" target="_blank" rel="noreferrer">
            <i class="ph-bold ph-arrow-square-out"></i>
            字体库
          </a>
        </div>
        <div class="panel-body">
          <div class="field-grid">
            <div class="field">
              <label for="sample-input">样本文字</label>
              <input id="sample-input" class="text-input" type="text" value="字体识别样张" maxlength="24">
            </div>
            <div class="field">
              <label for="sort-select">排序</label>
              <select id="sort-select" class="select-input">
                <option value="match">匹配优先</option>
                <option value="name">名称</option>
              </select>
            </div>
          </div>

          <div class="field mt-4">
            <label for="size-range">预览字号</label>
            <div class="range-row">
              <input id="size-range" type="range" min="28" max="72" value="46">
              <strong id="size-value">46px</strong>
            </div>
          </div>

          <div class="segmented" id="filter-row">
            <button class="filter-btn active" type="button" data-filter="all">全部</button>
            <button class="filter-btn" type="button" data-filter="sans">黑体</button>
            <button class="filter-btn" type="button" data-filter="serif">宋体</button>
            <button class="filter-btn" type="button" data-filter="round">圆体</button>
            <button class="filter-btn" type="button" data-filter="hand">手写</button>
            <button class="filter-btn" type="button" data-filter="display">美术</button>
          </div>

          <div class="compare-strip">
            <div id="source-thumb" class="source-thumb">
              <span class="text-slate-400 text-sm">原图</span>
            </div>
            <div class="live-preview">
              <p id="live-preview-text">字体识别样张</p>
            </div>
          </div>

          <div class="signal-grid">
            <div class="signal">
              <small>文字来源</small>
              <strong id="source-signal">手动样本</strong>
            </div>
            <div class="signal">
              <small>候选数量</small>
              <strong id="count-signal">0</strong>
            </div>
            <div class="signal">
              <small>当前模式</small>
              <strong id="mode-signal">人工比对</strong>
            </div>
          </div>
        </div>
      </section>
    </main>

    <section class="results">
      <div class="results-head">
        <h2>候选字体</h2>
        <button id="open-search-button" class="btn" type="button">
          <i class="ph-bold ph-magnifying-glass"></i>
          搜索样本
        </button>
      </div>
      <div id="result-grid" class="result-grid"></div>
    </section>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const uploadZone = document.getElementById('upload-zone');
    const imageStage = document.getElementById('image-stage');
    const previewImg = document.getElementById('preview-img');
    const resetButton = document.getElementById('reset-button');
    const analyzeButton = document.getElementById('analyze-button');
    const analyzeLabel = document.getElementById('analyze-label');
    const useDefaultButton = document.getElementById('use-default-button');
    const statusLine = document.getElementById('status-line');
    const sampleInput = document.getElementById('sample-input');
    const sortSelect = document.getElementById('sort-select');
    const sizeRange = document.getElementById('size-range');
    const sizeValue = document.getElementById('size-value');
    const livePreviewText = document.getElementById('live-preview-text');
    const filterRow = document.getElementById('filter-row');
    const resultGrid = document.getElementById('result-grid');
    const sourceThumb = document.getElementById('source-thumb');
    const sourceSignal = document.getElementById('source-signal');
    const countSignal = document.getElementById('count-signal');
    const modeSignal = document.getElementById('mode-signal');
    const serviceButton = document.getElementById('service-button');
    const serviceDot = document.getElementById('service-dot');
    const serviceText = document.getElementById('service-text');
    const openSearchButton = document.getElementById('open-search-button');
    const processingCanvas = document.getElementById('processing-canvas');

    const fonts = [
      { name: '思源黑体', family: 'Noto Sans SC', type: 'sans', category: '黑体', traits: ['现代', '清晰', '中性'], weight: 700 },
      { name: '思源宋体', family: 'Noto Serif SC', type: 'serif', category: '宋体', traits: ['衬线', '出版', '稳重'], weight: 700 },
      { name: '站酷小薇体', family: 'ZCOOL XiaoWei', type: 'serif', category: '标题宋', traits: ['复古', '标题', '细节'], weight: 400 },
      { name: '站酷庆科黄油体', family: 'ZCOOL QingKe HuangYou', type: 'display', category: '美术黑', traits: ['几何', '醒目', '招牌'], weight: 400 },
      { name: '站酷快乐体', family: 'ZCOOL KuaiLe', type: 'display', category: '创意体', traits: ['可爱', '粗壮', '活泼'], weight: 400 },
      { name: '马善政毛笔', family: 'Ma Shan Zheng', type: 'hand', category: '毛笔', traits: ['书法', '笔触', '传统'], weight: 400 },
      { name: '龙藏行草', family: 'Long Cang', type: 'hand', category: '行草', traits: ['连笔', '飘逸', '书法'], weight: 400 },
      { name: '志莽行书', family: 'Zhi Mang Xing', type: 'hand', category: '行书', traits: ['手写', '流动', '海报'], weight: 400 },
      { name: '流谦毛草', family: 'Liu Jian Mao Cao', type: 'hand', category: '草书', traits: ['草书', '强笔势', '艺术'], weight: 400 },
      { name: '系统圆体', family: 'Arial, Microsoft YaHei UI, sans-serif', type: 'round', category: '圆体', traits: ['圆润', '亲和', '屏显'], weight: 700 },
      { name: '系统黑体', family: 'Microsoft YaHei, PingFang SC, sans-serif', type: 'sans', category: '系统黑', traits: ['常用', '屏显', '均衡'], weight: 700 },
      { name: '系统宋体', family: 'SimSun, Songti SC, serif', type: 'serif', category: '系统宋', traits: ['正文', '衬线', '传统'], weight: 700 }
    ];

    let currentFile = null;
    let currentImageUrl = '';
    let currentFilter = 'all';
    let serverOcrAvailable = false;
    let textSource = '手动样本';

    init();

    function init() {
      bindEvents();
      checkServerOcrStatus();
      render();
    }

    function bindEvents() {
      fileInput.addEventListener('change', (event) => handleFile(event.target.files[0]));

      uploadZone.addEventListener('dragover', (event) => {
        event.preventDefault();
        uploadZone.classList.add('dragging');
      });

      uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragging'));

      uploadZone.addEventListener('drop', (event) => {
        event.preventDefault();
        uploadZone.classList.remove('dragging');
        handleFile(event.dataTransfer.files[0]);
      });

      document.addEventListener('paste', (event) => {
        const item = [...event.clipboardData.items].find((entry) => entry.type.startsWith('image/'));
        if (item) handleFile(item.getAsFile());
      });

      resetButton.addEventListener('click', resetImage);
      analyzeButton.addEventListener('click', analyzeImage);
      useDefaultButton.addEventListener('click', () => {
        textSource = '手动样本';
        sampleInput.focus();
        render();
      });

      sampleInput.addEventListener('input', () => {
        textSource = sampleInput.value.trim() ? textSource : '手动样本';
        render();
      });

      sortSelect.addEventListener('change', render);
      sizeRange.addEventListener('input', render);

      filterRow.addEventListener('click', (event) => {
        const button = event.target.closest('[data-filter]');
        if (!button) return;
        currentFilter = button.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach((item) => item.classList.remove('active'));
        button.classList.add('active');
        render();
      });

      serviceButton.addEventListener('click', () => {
        const message = serverOcrAvailable
          ? '服务端百度 OCR 已启用，密钥保存在 Vercel 环境变量中。'
          : '服务端百度 OCR 未启用；可在 Vercel 中配置 BAIDU_API_KEY 和 BAIDU_SECRET_KEY。';
        showStatus(message, false);
      });

      openSearchButton.addEventListener('click', () => {
        const query = encodeURIComponent(getSampleText());
        window.open(`https://www.fonts.net.cn/search.html?q=${query}`, '_blank', 'noopener,noreferrer');
      });
    }

    async function checkServerOcrStatus() {
      try {
        const response = await fetch('/api/ocr', { method: 'GET', cache: 'no-store' });
        const data = await response.json();
        serverOcrAvailable = Boolean(data.configured);
      } catch (error) {
        serverOcrAvailable = false;
      }

      serviceDot.classList.toggle('ready', serverOcrAvailable);
      serviceText.textContent = serverOcrAvailable ? '百度 OCR 已启用' : '本地 OCR 模式';
      analyzeLabel.textContent = serverOcrAvailable ? '识别文字' : '本地识别';
      modeSignal.textContent = serverOcrAvailable ? 'OCR + 比对' : '人工比对';
    }

    function handleFile(file) {
      if (!file || !file.type.startsWith('image/')) {
        showStatus('请选择图片文件。', true);
        return;
      }

      if (file.size > 8 * 1024 * 1024) {
        showStatus('图片超过 8MB，请先压缩或裁剪后再上传。', true);
        return;
      }

      currentFile = file;
      if (currentImageUrl) URL.revokeObjectURL(currentImageUrl);
      currentImageUrl = URL.createObjectURL(file);
      previewImg.src = currentImageUrl;

      uploadZone.classList.add('hidden');
      imageStage.classList.add('active');
      resetButton.classList.remove('hidden');
      analyzeButton.disabled = false;
      sourceThumb.innerHTML = `<img src="${currentImageUrl}" alt="原图缩略图">`;
      showStatus('图片已载入，可以提取样本文字。', false);
      render();
    }

    function resetImage() {
      currentFile = null;
      if (currentImageUrl) URL.revokeObjectURL(currentImageUrl);
      currentImageUrl = '';
      fileInput.value = '';
      previewImg.removeAttribute('src');
      uploadZone.classList.remove('hidden');
      imageStage.classList.remove('active', 'scanning');
      resetButton.classList.add('hidden');
      analyzeButton.disabled = true;
      sourceThumb.innerHTML = '<span class="text-slate-400 text-sm">原图</span>';
      textSource = '手动样本';
      hideStatus();
      render();
    }

    async function analyzeImage() {
      if (!currentFile) return;

      startLoading();
      try {
        const detectedText = serverOcrAvailable
          ? await callServerOCR(currentFile)
          : await runLocalOCR();

        const cleaned = cleanText(detectedText);
        if (cleaned) {
          sampleInput.value = cleaned;
          textSource = serverOcrAvailable ? '百度 OCR' : '本地 OCR';
          showStatus('文字已提取，请结合原图确认候选字体。', false);
        } else {
          textSource = '手动样本';
          showStatus('未提取到清晰文字，请手动输入样本。', true);
        }
      } catch (error) {
        console.error(error);
        if (serverOcrAvailable) {
          try {
            const localText = await runLocalOCR();
            const cleaned = cleanText(localText);
            if (cleaned) {
              sampleInput.value = cleaned;
              textSource = '本地 OCR';
              showStatus('服务端 OCR 失败，已切换为本地识别。', true);
            }
          } catch (fallbackError) {
            console.error(fallbackError);
            showStatus('识别失败，请手动输入样本文字。', true);
          }
        } else {
          showStatus('本地识别失败，请手动输入样本文字。', true);
        }
      } finally {
        stopLoading();
        render();
      }
    }

    async function callServerOCR(file) {
      const image = await fileToBase64(file);
      const response = await fetch('/api/ocr', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image })
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || 'Server OCR failed');
      return data.text || '';
    }

    async function runLocalOCR() {
      const processedImageUrl = preprocessImage(previewImg);
      const worker = await Tesseract.createWorker('chi_sim+eng');
      const result = await worker.recognize(processedImageUrl);
      await worker.terminate();
      return result.data.text || '';
    }

    function preprocessImage(imageElement) {
      const ctx = processingCanvas.getContext('2d');
      processingCanvas.width = imageElement.naturalWidth || 1;
      processingCanvas.height = imageElement.naturalHeight || 1;
      ctx.drawImage(imageElement, 0, 0);
      const imageData = ctx.getImageData(0, 0, processingCanvas.width, processingCanvas.height);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        const avg = 0.2126 * data[i] + 0.7152 * data[i + 1] + 0.0722 * data[i + 2];
        const value = avg > 145 ? 255 : 0;
        data[i] = value;
        data[i + 1] = value;
        data[i + 2] = value;
      }
      ctx.putImageData(imageData, 0, 0);
      return processingCanvas.toDataURL('image/png');
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function render() {
      const sample = getSampleText();
      const size = Number(sizeRange.value);
      sizeValue.textContent = `${size}px`;
      livePreviewText.textContent = sample;
      livePreviewText.style.fontSize = `${Math.min(size, 56)}px`;
      livePreviewText.style.fontFamily = "'Noto Sans SC', sans-serif";
      sourceSignal.textContent = textSource;

      const candidates = getCandidates();
      countSignal.textContent = String(candidates.length);

      if (!candidates.length) {
        resultGrid.innerHTML = '<div class="empty-state">没有符合筛选条件的候选字体。</div>';
        return;
      }

      resultGrid.innerHTML = candidates.map((font) => renderFontCard(font, sample, size)).join('');
    }

    function getCandidates() {
      const filtered = currentFilter === 'all'
        ? [...fonts]
        : fonts.filter((font) => font.type === currentFilter);

      const scored = filtered.map((font) => ({
        ...font,
        score: calculateScore(font)
      }));

      if (sortSelect.value === 'name') {
        return scored.sort((a, b) => a.name.localeCompare(b.name, 'zh-Hans-CN'));
      }

      return scored.sort((a, b) => b.score - a.score || a.name.localeCompare(b.name, 'zh-Hans-CN'));
    }

    function calculateScore(font) {
      let score = 62;
      if (currentFilter !== 'all' && font.type === currentFilter) score += 22;
      if (serverOcrAvailable) score += 4;
      if (currentFile) score += 6;
      if (font.type === 'sans') score += 3;
      if (font.type === 'hand') score -= 3;
      return Math.max(42, Math.min(96, score));
    }

    function renderFontCard(font, sample, size) {
      const searchName = encodeURIComponent(font.name);
      const sampleQuery = encodeURIComponent(sample);
      const fontsNetUrl = `https://www.fonts.net.cn/search.html?q=${searchName}`;
      const googleUrl = `https://www.google.com/search?q=${searchName}+字体`;
      const tags = [font.category, ...font.traits].map((trait) => `<span class="tag">${escapeHtml(trait)}</span>`).join('');

      return `
        <article class="font-card">
          <div class="font-card-head">
            <div>
              <h3>${escapeHtml(font.name)}</h3>
              <small>${escapeHtml(font.family)}</small>
            </div>
            <div class="score">${font.score}%</div>
          </div>
          <div class="font-sample">
            <p style="font-family: '${escapeAttr(font.family)}'; font-size: ${size}px; font-weight: ${font.weight};">${escapeHtml(sample)}</p>
          </div>
          <div class="tag-row">${tags}</div>
          <div class="font-actions">
            <a href="${fontsNetUrl}" target="_blank" rel="noreferrer"><i class="ph-bold ph-magnifying-glass"></i>查字体</a>
            <a href="${googleUrl}&tbm=isch&sample=${sampleQuery}" target="_blank" rel="noreferrer"><i class="ph-bold ph-images"></i>看图例</a>
          </div>
        </article>
      `;
    }

    function getSampleText() {
      return sampleInput.value.trim() || '字体识别样张';
    }

    function cleanText(text) {
      return String(text || '').replace(/\s+/g, '').replace(/[|｜]/g, '').slice(0, 24);
    }

    function startLoading() {
      analyzeButton.disabled = true;
      imageStage.classList.add('scanning');
      analyzeLabel.textContent = '识别中';
      showStatus(serverOcrAvailable ? '正在调用服务端 OCR...' : '正在运行本地 OCR...', false);
    }

    function stopLoading() {
      analyzeButton.disabled = !currentFile;
      imageStage.classList.remove('scanning');
      analyzeLabel.textContent = serverOcrAvailable ? '识别文字' : '本地识别';
    }

    function showStatus(message, important) {
      statusLine.textContent = message;
      statusLine.classList.remove('hidden');
      statusLine.style.borderLeftColor = important ? 'var(--accent)' : 'var(--brand)';
      statusLine.style.background = important ? '#fff7ed' : '#edfdf8';
      statusLine.style.color = important ? '#9a3412' : '#075f4c';
    }

    function hideStatus() {
      statusLine.classList.add('hidden');
      statusLine.textContent = '';
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function escapeAttr(value) {
      return String(value).replace(/['\\]/g, '');
    }
  </script>
</body>
</html>
